services:
  fabro:
    image: ghcr.io/fabro-sh/fabro:nightly
    restart: unless-stopped
    ports:
      - "32276:32276"
    volumes:
      - fabro-storage:/storage
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - path: .env
        required: false

volumes:
  fabro-storage:
