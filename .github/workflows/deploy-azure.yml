name: Deploy Azure

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always
  TF_IN_AUTOMATION: "true"
  LIBZ_SYS_STATIC: "1"

jobs:
  deploy:
    name: Deploy production Azure environment
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          no-cache: true

      - name: Install bun deps
        run: bun install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev

      - name: Set up zig
        uses: mlugg/setup-zig@8d6198c65fb0feaa111df26e6b467fea8345e46f # v2.0.5
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@773334c0e05d7e699e4d78234494308223f3a2cf # v2
        with:
          tool: cargo-zigbuild

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Validate Azure deploy inputs
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          AZURE_RESOURCE_GROUP_NAME: ${{ vars.AZURE_RESOURCE_GROUP_NAME }}
          AZURE_VNET_NAME: ${{ vars.AZURE_VNET_NAME }}
          AZURE_VNET_CIDR: ${{ vars.AZURE_VNET_CIDR }}
          AZURE_ACA_SUBNET_NAME: ${{ vars.AZURE_ACA_SUBNET_NAME }}
          AZURE_ACA_SUBNET_CIDR: ${{ vars.AZURE_ACA_SUBNET_CIDR }}
          AZURE_ACI_SUBNET_NAME: ${{ vars.AZURE_ACI_SUBNET_NAME }}
          AZURE_ACI_SUBNET_CIDR: ${{ vars.AZURE_ACI_SUBNET_CIDR }}
          AZURE_STORAGE_ACCOUNT_NAME: ${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}
          AZURE_SERVER_STORAGE_SHARE_NAME: ${{ vars.AZURE_SERVER_STORAGE_SHARE_NAME }}
          AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
          AZURE_IDENTITY_NAME: ${{ vars.AZURE_IDENTITY_NAME }}
          AZURE_CONTAINER_APPS_ENVIRONMENT_NAME: ${{ vars.AZURE_CONTAINER_APPS_ENVIRONMENT_NAME }}
          AZURE_FABRO_SERVER_NAME: ${{ vars.AZURE_FABRO_SERVER_NAME }}
          AZURE_GITHUB_ACTIONS_PRINCIPAL_ID: ${{ vars.AZURE_GITHUB_ACTIONS_PRINCIPAL_ID }}
          TF_BACKEND_RESOURCE_GROUP: ${{ vars.TF_BACKEND_RESOURCE_GROUP }}
          TF_BACKEND_STORAGE_ACCOUNT: ${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}
          TF_BACKEND_CONTAINER: ${{ vars.TF_BACKEND_CONTAINER }}
          TF_BACKEND_KEY: ${{ vars.TF_BACKEND_KEY }}
        run: |
          for name in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AZURE_LOCATION AZURE_RESOURCE_GROUP_NAME AZURE_VNET_NAME AZURE_VNET_CIDR AZURE_ACA_SUBNET_NAME AZURE_ACA_SUBNET_CIDR AZURE_ACI_SUBNET_NAME AZURE_ACI_SUBNET_CIDR AZURE_STORAGE_ACCOUNT_NAME AZURE_SERVER_STORAGE_SHARE_NAME AZURE_ACR_NAME AZURE_IDENTITY_NAME AZURE_CONTAINER_APPS_ENVIRONMENT_NAME AZURE_FABRO_SERVER_NAME AZURE_GITHUB_ACTIONS_PRINCIPAL_ID TF_BACKEND_RESOURCE_GROUP TF_BACKEND_STORAGE_ACCOUNT TF_BACKEND_CONTAINER TF_BACKEND_KEY; do
            if [ -z "${!name}" ]; then
              printf 'Missing required GitHub environment variable: %s\n' "$name" >&2
              exit 1
            fi
          done

      - name: Validate GitHub App deploy inputs
        env:
          FABRO_DEPLOY_GITHUB_TOKEN: ${{ secrets.FABRO_DEPLOY_GITHUB_TOKEN }}
          FABRO_DEPLOY_GITHUB_APP_CLIENT_SECRET: ${{ secrets.FABRO_DEPLOY_GITHUB_APP_CLIENT_SECRET }}
          FABRO_DEPLOY_GITHUB_APP_PRIVATE_KEY: ${{ secrets.FABRO_DEPLOY_GITHUB_APP_PRIVATE_KEY }}
          FABRO_DEPLOY_GITHUB_APP_ID: ${{ vars.FABRO_DEPLOY_GITHUB_APP_ID }}
          FABRO_DEPLOY_GITHUB_APP_CLIENT_ID: ${{ vars.FABRO_DEPLOY_GITHUB_APP_CLIENT_ID }}
          FABRO_DEPLOY_GITHUB_APP_SLUG: ${{ vars.FABRO_DEPLOY_GITHUB_APP_SLUG }}
          FABRO_DEPLOY_GITHUB_ALLOWED_USERNAME: ${{ vars.FABRO_DEPLOY_GITHUB_ALLOWED_USERNAME }}
        run: |
          app_config_present=false
          for name in FABRO_DEPLOY_GITHUB_APP_ID FABRO_DEPLOY_GITHUB_APP_CLIENT_ID FABRO_DEPLOY_GITHUB_APP_SLUG FABRO_DEPLOY_GITHUB_ALLOWED_USERNAME FABRO_DEPLOY_GITHUB_APP_CLIENT_SECRET FABRO_DEPLOY_GITHUB_APP_PRIVATE_KEY; do
            if [ -n "${!name}" ]; then
              app_config_present=true
            fi
          done

          if [ "$app_config_present" = true ]; then
            for name in FABRO_DEPLOY_GITHUB_TOKEN FABRO_DEPLOY_GITHUB_APP_ID FABRO_DEPLOY_GITHUB_APP_CLIENT_ID FABRO_DEPLOY_GITHUB_APP_SLUG FABRO_DEPLOY_GITHUB_ALLOWED_USERNAME FABRO_DEPLOY_GITHUB_APP_CLIENT_SECRET FABRO_DEPLOY_GITHUB_APP_PRIVATE_KEY; do
              if [ -z "${!name}" ]; then
                printf 'Missing GitHub App deploy value required for headless install: %s\n' "$name" >&2
                exit 1
              fi
            done
            echo "Headless GitHub App install inputs are present."
          else
            echo "No GitHub App install inputs found; first install will stop at the documented manual GitHub App linkage handoff if the server is still in install mode."
          fi

      - name: Initialize deploy auth state
        env:
          FABRO_DEPLOY_DEV_TOKEN: ${{ secrets.FABRO_DEPLOY_DEV_TOKEN }}
        run: |
          if [ -n "$FABRO_DEPLOY_DEV_TOKEN" ]; then
            {
              echo "RUN_AUTHENTICATED_CHECKS=true"
              echo "FABRO_DEPLOY_RUNTIME_DEV_TOKEN=$FABRO_DEPLOY_DEV_TOKEN"
            } >> "$GITHUB_ENV"
          else
            {
              echo "RUN_AUTHENTICATED_CHECKS=false"
              echo "FABRO_DEPLOY_RUNTIME_DEV_TOKEN="
            } >> "$GITHUB_ENV"
          fi

      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Export Terraform inputs
        run: |
          {
            echo "TF_VAR_subscription_id=${{ vars.AZURE_SUBSCRIPTION_ID }}"
            echo "TF_VAR_location=${{ vars.AZURE_LOCATION }}"
            echo "TF_VAR_resource_group_name=${{ vars.AZURE_RESOURCE_GROUP_NAME }}"
            echo "TF_VAR_vnet_name=${{ vars.AZURE_VNET_NAME }}"
            echo "TF_VAR_vnet_cidr=${{ vars.AZURE_VNET_CIDR }}"
            echo "TF_VAR_aca_subnet_name=${{ vars.AZURE_ACA_SUBNET_NAME }}"
            echo "TF_VAR_aca_subnet_cidr=${{ vars.AZURE_ACA_SUBNET_CIDR }}"
            echo "TF_VAR_aci_subnet_name=${{ vars.AZURE_ACI_SUBNET_NAME }}"
            echo "TF_VAR_aci_subnet_cidr=${{ vars.AZURE_ACI_SUBNET_CIDR }}"
            echo "TF_VAR_storage_account_name=${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}"
            echo "TF_VAR_server_storage_share_name=${{ vars.AZURE_SERVER_STORAGE_SHARE_NAME }}"
            echo "TF_VAR_acr_name=${{ vars.AZURE_ACR_NAME }}"
            echo "TF_VAR_identity_name=${{ vars.AZURE_IDENTITY_NAME }}"
            echo "TF_VAR_container_apps_environment_name=${{ vars.AZURE_CONTAINER_APPS_ENVIRONMENT_NAME }}"
            echo "TF_VAR_fabro_server_name=${{ vars.AZURE_FABRO_SERVER_NAME }}"
            echo "TF_VAR_github_actions_principal_id=${{ vars.AZURE_GITHUB_ACTIONS_PRINCIPAL_ID }}"
            echo 'TF_VAR_tags={ environment = "sandbox", managed_by = "terraform" }'
          } >> "$GITHUB_ENV"
          printf 'Using GitHub Actions principal ID from GitHub environment: %s\n' "${{ vars.AZURE_GITHUB_ACTIONS_PRINCIPAL_ID }}"

      # Do not make AZURE_GITHUB_ACTIONS_PRINCIPAL_ID optional in the supported path.
      # The greenfield sequence depends on the first manual terraform/environments/sandbox
      # apply creating module.github_actions_access before GitHub Actions runs, so the CI
      # identity never needs Microsoft.Authorization/roleAssignments/write itself.

      - name: Init Terraform backend
        run: |
          terraform -chdir=terraform/environments/sandbox init \
            -backend-config="resource_group_name=${{ vars.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_BACKEND_CONTAINER }}" \
            -backend-config="key=${{ vars.TF_BACKEND_KEY }}"

      - name: Preflight Terraform plan
        run: |
          terraform -chdir=terraform/environments/sandbox plan \
            -refresh=false \
            -lock=false \
            -input=false \
            -var="fabro_server_image=example.azurecr.io/fabro-server:preflight"

      - name: Compute deploy metadata
        run: |
          echo "DEPLOY_ID=$(date -u +%Y%m%dT%H%M%SZ)-$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Resolve ACR outputs
        run: |
          echo "ACR_NAME=$(terraform -chdir=terraform/environments/sandbox output -raw acr_name)" >> "$GITHUB_ENV"
          echo "ACR_SERVER=$(terraform -chdir=terraform/environments/sandbox output -raw acr_login_server)" >> "$GITHUB_ENV"

      - name: Login to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Refresh embedded SPA
        run: cargo dev spa refresh

      - name: Build fabro server binary
        run: cargo zigbuild --target x86_64-unknown-linux-musl --release -p fabro-cli

      - name: Stage server Docker context
        run: |
          install -D -m 0755 \
            target/x86_64-unknown-linux-musl/release/fabro \
            tmp/docker-context/amd64/fabro

      - name: Build fabro-sandboxd binary
        run: cargo build --release -p fabro-sandboxd

      - name: Stage sandbox base Docker context
        run: |
          rm -rf "$RUNNER_TEMP/azure-sandbox-build"
          mkdir -p "$RUNNER_TEMP/azure-sandbox-build/out"
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.terraform' \
            --exclude 'target' \
            --exclude 'tmp' \
            --exclude '.worktrees' \
            --exclude 'node_modules' \
            --exclude 'apps/fabro-web/node_modules' \
            --exclude 'apps/marketing/node_modules' \
            ./ "$RUNNER_TEMP/azure-sandbox-build/"
          install -D -m 0755 \
            target/release/fabro-sandboxd \
            "$RUNNER_TEMP/azure-sandbox-build/out/fabro-sandboxd"
          rm -f "$RUNNER_TEMP/azure-sandbox-build/.dockerignore"

      - name: Build and push fabro-server
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile \
            -t "$ACR_SERVER/fabro-server:$DEPLOY_ID" \
            --push .

      - name: Build and push fabro-azure-sandbox-base
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f "$RUNNER_TEMP/azure-sandbox-build/docker/azure-sandbox-base.Dockerfile" \
            -t "$ACR_SERVER/fabro-azure-sandbox-base:$DEPLOY_ID" \
            --push "$RUNNER_TEMP/azure-sandbox-build"

      - name: Apply Terraform
        run: |
          terraform -chdir=terraform/environments/sandbox apply -auto-approve \
            -var="fabro_server_image=$ACR_SERVER/fabro-server:$DEPLOY_ID"

      - name: Verify Terraform steady state
        run: |
          terraform -chdir=terraform/environments/sandbox plan -detailed-exitcode \
            -var="fabro_server_image=$ACR_SERVER/fabro-server:$DEPLOY_ID"

      - name: Wait for Container App rollout
        run: |
          for attempt in $(seq 1 30); do
            READY_REVISION=$(az containerapp show \
              --resource-group "$TF_VAR_resource_group_name" \
              --name "$TF_VAR_fabro_server_name" \
              --query 'properties.latestReadyRevisionName' \
              -o tsv)

            LATEST_REVISION=$(az containerapp show \
              --resource-group "$TF_VAR_resource_group_name" \
              --name "$TF_VAR_fabro_server_name" \
              --query 'properties.latestRevisionName' \
              -o tsv)

            if [ -n "$READY_REVISION" ] && [ "$READY_REVISION" = "$LATEST_REVISION" ]; then
              echo "READY_REVISION=$READY_REVISION" >> "$GITHUB_ENV"
              exit 0
            fi

            sleep 10
          done

          printf 'Timed out waiting for an active healthy Container App revision\n' >&2
          exit 1

      - name: Resolve live server URL
        run: |
          INGRESS_FQDN=$(az containerapp show \
            --resource-group "$TF_VAR_resource_group_name" \
            --name "$TF_VAR_fabro_server_name" \
            --query 'properties.configuration.ingress.fqdn' \
            -o tsv)

          if [ -z "$INGRESS_FQDN" ]; then
            printf 'Failed to resolve Container App ingress FQDN\n' >&2
            exit 1
          fi

          echo "FABRO_SERVER_URL=https://$INGRESS_FQDN" >> "$GITHUB_ENV"

      - name: Health check
        run: |
          curl --retry 12 \
            --retry-all-errors \
            --retry-delay 5 \
            --connect-timeout 10 \
            -fsSL "$FABRO_SERVER_URL/health"

      - name: Read server health state
        run: |
          HEALTH_JSON=$(curl --retry 12 \
            --retry-all-errors \
            --retry-delay 5 \
            --connect-timeout 10 \
            -fsSL "$FABRO_SERVER_URL/health")
          STATUS=$(printf '%s' "$HEALTH_JSON" | jq -r '.status // ""')
          MODE=$(printf '%s' "$HEALTH_JSON" | jq -r '.mode // ""')

          if [ "$STATUS" != "ok" ]; then
            printf 'Expected /health status=ok, got: %s\n' "$HEALTH_JSON" >&2
            exit 1
          fi

          case "$MODE" in
            "")
              echo "SERVER_INSTALL_MODE=false" >> "$GITHUB_ENV"
              ;;
            install)
              echo "SERVER_INSTALL_MODE=true" >> "$GITHUB_ENV"
              ;;
            *)
              printf 'Unexpected /health mode payload: %s\n' "$HEALTH_JSON" >&2
              exit 1
              ;;
          esac

      - name: Auto-complete install when needed
        if: ${{ env.SERVER_INSTALL_MODE == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.FABRO_DEPLOY_GITHUB_TOKEN }}
          FABRO_DEPLOY_GITHUB_APP_CLIENT_SECRET: ${{ secrets.FABRO_DEPLOY_GITHUB_APP_CLIENT_SECRET }}
          FABRO_DEPLOY_GITHUB_APP_PRIVATE_KEY: ${{ secrets.FABRO_DEPLOY_GITHUB_APP_PRIVATE_KEY }}
          FABRO_DEPLOY_GITHUB_APP_WEBHOOK_SECRET: ${{ secrets.FABRO_DEPLOY_GITHUB_APP_WEBHOOK_SECRET }}
          FABRO_DEPLOY_GITHUB_APP_ID: ${{ vars.FABRO_DEPLOY_GITHUB_APP_ID }}
          FABRO_DEPLOY_GITHUB_APP_CLIENT_ID: ${{ vars.FABRO_DEPLOY_GITHUB_APP_CLIENT_ID }}
          FABRO_DEPLOY_GITHUB_APP_SLUG: ${{ vars.FABRO_DEPLOY_GITHUB_APP_SLUG }}
          FABRO_DEPLOY_GITHUB_ALLOWED_USERNAME: ${{ vars.FABRO_DEPLOY_GITHUB_ALLOWED_USERNAME }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
        run: |
          has_headless_github_app_config() {
            [ -n "$FABRO_DEPLOY_GITHUB_APP_ID" ] \
              && [ -n "$FABRO_DEPLOY_GITHUB_APP_CLIENT_ID" ] \
              && [ -n "$FABRO_DEPLOY_GITHUB_APP_CLIENT_SECRET" ] \
              && [ -n "$FABRO_DEPLOY_GITHUB_APP_PRIVATE_KEY" ] \
              && [ -n "$FABRO_DEPLOY_GITHUB_APP_SLUG" ] \
              && [ -n "$FABRO_DEPLOY_GITHUB_ALLOWED_USERNAME" ]
          }

          if [ -z "$GH_TOKEN" ]; then
            printf 'FABRO_DEPLOY_GITHUB_TOKEN is required so the workflow can persist FABRO_DEPLOY_DEV_TOKEN after install\n' >&2
            exit 1
          fi

          read_install_token_from_logs() {
            for tail_arg in '--tail 200' '--tail 500' '--tail 1000'; do
              if token=$(az containerapp logs show \
                --resource-group "$TF_VAR_resource_group_name" \
                --name "$TF_VAR_fabro_server_name" \
                --revision "$READY_REVISION" \
                $tail_arg \
                | perl -nle 'if (/^\s*([A-Za-z0-9_-]{40,})\s*$/) { $token = $1 } elsif (/\/install\?token=([A-Za-z0-9_-]{40,})/) { $token = $1 } END { print $token if defined $token }'); then
                if [ -n "$token" ]; then
                  printf '%s\n' "$token"
                  return 0
                fi
              fi
            done

            return 0
          }

          INSTALL_TOKEN=
          for attempt in $(seq 1 12); do
            INSTALL_TOKEN=$(read_install_token_from_logs)
            if [ -n "$INSTALL_TOKEN" ]; then
              break
            fi

            sleep 5
          done

          if [ -z "$INSTALL_TOKEN" ]; then
            printf 'Failed to find install token in Container App logs\n' >&2
            exit 1
          fi

          RESOURCE_GROUP_NAME=$(terraform -chdir=terraform/environments/sandbox output -raw resource_group_name)
          ACI_SUBNET_ID=$(terraform -chdir=terraform/environments/sandbox output -raw aci_subnet_id)
          ACR_SERVER=$(terraform -chdir=terraform/environments/sandbox output -raw acr_login_server)
          ACR_IDENTITY_RESOURCE_ID=$(terraform -chdir=terraform/environments/sandbox output -raw acr_identity_resource_id)
          STORAGE_ACCOUNT_NAME=$(terraform -chdir=terraform/environments/sandbox output -raw storage_account_name)
          BLOB_DATA_CONTAINER_NAME=$(terraform -chdir=terraform/environments/sandbox output -raw blob_data_container_name)

          if ! gh api "repos/$GITHUB_REPOSITORY" >/dev/null; then
            printf 'FABRO_DEPLOY_GITHUB_TOKEN cannot access target repo %s for repository checks and FABRO_DEPLOY_DEV_TOKEN persistence\n' "$GITHUB_REPOSITORY" >&2
            exit 1
          fi

          install_request() {
            local method=$1
            local path=$2
            local body=${3-}
            local response_file
            local status

            response_file=$(mktemp)

            if [ -n "$body" ]; then
              if ! status=$(curl --retry 12 \
                --retry-all-errors \
                --retry-delay 5 \
                --connect-timeout 10 \
                -sS \
                -o "$response_file" \
                -w '%{http_code}' \
                -X "$method" \
                -H "Authorization: Bearer $INSTALL_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$body" \
                "$FABRO_SERVER_URL$path"); then
                printf 'Install request %s %s failed before a successful HTTP response\n' "$method" "$path" >&2
                head -c 2000 "$response_file" >&2 || true
                rm -f "$response_file"
                return 1
              fi
            else
              if ! status=$(curl --retry 12 \
                --retry-all-errors \
                --retry-delay 5 \
                --connect-timeout 10 \
                -sS \
                -o "$response_file" \
                -w '%{http_code}' \
                -X "$method" \
                -H "Authorization: Bearer $INSTALL_TOKEN" \
                "$FABRO_SERVER_URL$path"); then
                printf 'Install request %s %s failed before a successful HTTP response\n' "$method" "$path" >&2
                head -c 2000 "$response_file" >&2 || true
                rm -f "$response_file"
                return 1
              fi
            fi

            case "$status" in
              2*)
                cat "$response_file"
                rm -f "$response_file"
                ;;
              *)
                printf 'Install request %s %s returned HTTP %s\n' "$method" "$path" "$status" >&2
                head -c 2000 "$response_file" >&2 || true
                rm -f "$response_file"
                return 1
                ;;
            esac
          }

          install_request PUT /install/server "$(jq -nc \
            --arg canonical_url "$FABRO_SERVER_URL" \
            '{canonical_url:$canonical_url}')"

          install_request PUT /install/azure "$(jq -nc \
            --arg subscription_id "$AZURE_SUBSCRIPTION_ID" \
            --arg resource_group "$RESOURCE_GROUP_NAME" \
            --arg location "$AZURE_LOCATION" \
            --arg subnet_id "$ACI_SUBNET_ID" \
            --arg acr_server "$ACR_SERVER" \
            --arg acr_identity_resource_id "$ACR_IDENTITY_RESOURCE_ID" \
            '{subscription_id:$subscription_id,resource_group:$resource_group,location:$location,subnet_id:$subnet_id,acr_server:$acr_server,acr_identity_resource_id:$acr_identity_resource_id,sandboxd_port:7777}')"

          install_request PUT /install/object-store "$(jq -nc \
            --arg account "$STORAGE_ACCOUNT_NAME" \
            --arg container "$BLOB_DATA_CONTAINER_NAME" \
            '{provider:"azure",account:$account,container:$container}')"

          install_request PUT /install/sandbox '{"provider":"azure"}'

          install_request PUT /install/llm '{"providers":[{"provider":"openai","api_key":"dummy-openai-key-for-azure-bootstrap"}]}'

          if has_headless_github_app_config; then
            PROBE_SECRET_NAME="FABRO_DEPLOY_GITHUB_TOKEN_PROBE_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
            for attempt in $(seq 1 3); do
              if gh secret set "$PROBE_SECRET_NAME" \
                --repo "$GITHUB_REPOSITORY" \
                --env production \
                --body probe >/dev/null; then
                break
              fi

              if [ "$attempt" -eq 3 ]; then
                printf 'FABRO_DEPLOY_GITHUB_TOKEN cannot write GitHub production environment secrets for %s to support repository access checks and FABRO_DEPLOY_DEV_TOKEN persistence\n' "$GITHUB_REPOSITORY" >&2
                exit 1
              fi

              sleep 5
            done

            cleanup_failed=true
            for attempt in $(seq 1 3); do
              if gh secret delete "$PROBE_SECRET_NAME" \
                --repo "$GITHUB_REPOSITORY" \
                --env production >/dev/null; then
                cleanup_failed=false
                break
              fi

              sleep 5
            done

            if [ "$cleanup_failed" = true ]; then
              printf 'Warning: failed to delete temporary probe secret %s from the GitHub production environment after retries\n' "$PROBE_SECRET_NAME" >&2
            fi

            install_request PUT /install/github/app "$(jq -nc \
              --arg app_id "$FABRO_DEPLOY_GITHUB_APP_ID" \
              --arg client_id "$FABRO_DEPLOY_GITHUB_APP_CLIENT_ID" \
              --arg client_secret "$FABRO_DEPLOY_GITHUB_APP_CLIENT_SECRET" \
              --arg private_key "$FABRO_DEPLOY_GITHUB_APP_PRIVATE_KEY" \
              --arg slug "$FABRO_DEPLOY_GITHUB_APP_SLUG" \
              --arg allowed_username "$FABRO_DEPLOY_GITHUB_ALLOWED_USERNAME" \
              --arg webhook_secret "$FABRO_DEPLOY_GITHUB_APP_WEBHOOK_SECRET" \
              '{app_id:$app_id,client_id:$client_id,client_secret:$client_secret,private_key:$private_key,slug:$slug,allowed_username:$allowed_username,webhook_secret:($webhook_secret | if . == "" then null else . end)}')"
          else
            {
              echo "### Azure install requires manual GitHub App linkage"
              echo
              echo "Azure infrastructure is up and the non-GitHub install steps were prefilled."
              echo
              echo "Missing GitHub production environment values for headless GitHub App install:"
              echo "- vars.FABRO_DEPLOY_GITHUB_APP_ID"
              echo "- vars.FABRO_DEPLOY_GITHUB_APP_CLIENT_ID"
              echo "- vars.FABRO_DEPLOY_GITHUB_APP_SLUG"
              echo "- vars.FABRO_DEPLOY_GITHUB_ALLOWED_USERNAME"
              echo "- secrets.FABRO_DEPLOY_GITHUB_APP_CLIENT_SECRET"
              echo "- secrets.FABRO_DEPLOY_GITHUB_APP_PRIVATE_KEY"
              echo "- optional secrets.FABRO_DEPLOY_GITHUB_APP_WEBHOOK_SECRET"
              echo
              echo "Complete GitHub App linkage manually in the install UI, store FABRO_DEPLOY_DEV_TOKEN, then rerun this workflow."
            } >> "$GITHUB_STEP_SUMMARY"
            printf 'GitHub App values are missing; leaving the deployment at the manual linkage handoff point\n' >&2
            exit 1
          fi

          FINISH_RESPONSE=$(install_request POST /install/finish)
          DEV_TOKEN=$(printf '%s' "$FINISH_RESPONSE" | jq -r '.dev_token // ""')

          if [ -z "$DEV_TOKEN" ]; then
            printf 'Install finish did not return a dev token: %s\n' "$FINISH_RESPONSE" >&2
            exit 1
          fi

          echo "::add-mask::$DEV_TOKEN"
          {
            echo "FABRO_DEPLOY_RUNTIME_DEV_TOKEN=$DEV_TOKEN"
            echo "RUN_AUTHENTICATED_CHECKS=true"
          } >> "$GITHUB_ENV"

          for attempt in $(seq 1 3); do
            if gh secret set FABRO_DEPLOY_DEV_TOKEN \
              --repo "$GITHUB_REPOSITORY" \
              --env production \
              --body "$DEV_TOKEN"; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              printf 'Failed to persist FABRO_DEPLOY_DEV_TOKEN to the GitHub production environment secret\n' >&2
              exit 1
            fi

            sleep 5
          done

      - name: Wait for configured server
        if: ${{ env.SERVER_INSTALL_MODE == 'true' }}
        run: |
          for attempt in $(seq 1 30); do
            HEALTH_JSON=$(curl --retry 12 \
              --retry-all-errors \
              --retry-delay 5 \
              --connect-timeout 10 \
              -fsSL "$FABRO_SERVER_URL/health")
            STATUS=$(printf '%s' "$HEALTH_JSON" | jq -r '.status // ""')
            MODE=$(printf '%s' "$HEALTH_JSON" | jq -r '.mode // ""')

            if [ "$STATUS" = "ok" ] && [ -z "$MODE" ]; then
              exit 0
            fi

            sleep 10
          done

          printf 'Server never exited install mode after auto-install\n' >&2
          exit 1

      # Authenticated smoke checks use a reusable dev token that the workflow
      # persists after install completion when GitHub linkage is configured.
      - name: Authenticated API check
        if: ${{ env.RUN_AUTHENTICATED_CHECKS == 'true' }}
        run: |
          curl --retry 12 \
            --retry-all-errors \
            --retry-delay 5 \
            --connect-timeout 10 \
            -fsSL \
            -H "Authorization: Bearer $FABRO_DEPLOY_RUNTIME_DEV_TOKEN" \
            "$FABRO_SERVER_URL/api/v1/models"

      - name: Stage smoke workflow bundle with deployed sandbox image
        if: ${{ env.RUN_AUTHENTICATED_CHECKS == 'true' }}
        run: |
          rm -rf "$RUNNER_TEMP/azure-deploy-smoke"
          mkdir -p "$RUNNER_TEMP/azure-deploy-smoke"
          cp -R .fabro/workflows/azure-deploy-smoke/. "$RUNNER_TEMP/azure-deploy-smoke/"
          sed -i.bak \
            "s|image = \".*\"|image = \"$ACR_SERVER/fabro-azure-sandbox-base:$DEPLOY_ID\"|" \
            "$RUNNER_TEMP/azure-deploy-smoke/workflow.toml"
          rm -f "$RUNNER_TEMP/azure-deploy-smoke/workflow.toml.bak"

      - name: Run Azure smoke workflow
        if: ${{ env.RUN_AUTHENTICATED_CHECKS == 'true' }}
        working-directory: ${{ runner.temp }}/azure-deploy-smoke
        env:
          FABRO_DEV_TOKEN: ${{ env.FABRO_DEPLOY_RUNTIME_DEV_TOKEN }}
        run: |
          cargo run --manifest-path "$GITHUB_WORKSPACE/Cargo.toml" -p fabro-cli -- \
            auth login \
            --server "$FABRO_SERVER_URL" \
            --dev-token "$FABRO_DEPLOY_RUNTIME_DEV_TOKEN"

          cargo run --manifest-path "$GITHUB_WORKSPACE/Cargo.toml" -p fabro-cli -- \
            run workflow.toml \
            --server "$FABRO_SERVER_URL/api/v1"

      - name: Verify required workflow images
        env:
          AZURE_REQUIRED_WORKFLOW_IMAGES: ${{ vars.AZURE_REQUIRED_WORKFLOW_IMAGES }}
        run: |
          if [ -z "$AZURE_REQUIRED_WORKFLOW_IMAGES" ]; then
            echo "No AZURE_REQUIRED_WORKFLOW_IMAGES variable configured; skipping workflow-specific image existence checks."
            exit 0
          fi

          missing=false
          while IFS= read -r raw_image; do
            image=$(printf '%s' "$raw_image" | xargs)
            if [ -z "$image" ]; then
              continue
            fi

            case "$image" in
              "$ACR_SERVER"/*)
                repository_and_tag=${image#"$ACR_SERVER"/}
                ;;
              *)
                printf 'Required workflow image %s is not in this environment ACR (%s)\n' "$image" "$ACR_SERVER" >&2
                missing=true
                continue
                ;;
            esac

            if ! az acr repository show --name "$ACR_NAME" --image "$repository_and_tag" >/dev/null 2>&1; then
              printf 'Required workflow image is missing from ACR: %s\n' "$image" >&2
              missing=true
            else
              printf 'Verified required workflow image: %s\n' "$image"
            fi
          done < <(printf '%s\n' "$AZURE_REQUIRED_WORKFLOW_IMAGES" | tr ',' '\n')

          if [ "$missing" = true ]; then
            exit 1
          fi

      - name: Deployment summary
        run: |
          {
            echo "## Azure deploy summary"
            echo
            echo "- Ref: \`${{ inputs.ref }}\`"
            echo "- Deploy ID: \`$DEPLOY_ID\`"
            echo "- Server image: \`$ACR_SERVER/fabro-server:$DEPLOY_ID\`"
            echo "- Sandbox image: \`$ACR_SERVER/fabro-azure-sandbox-base:$DEPLOY_ID\`"
            echo "- Ready revision: \`${READY_REVISION:-unknown}\`"
            if [ "$RUN_AUTHENTICATED_CHECKS" = "true" ]; then
              echo "- Post-deploy authenticated checks: passed"
            else
              echo "- Post-deploy authenticated checks: skipped because no deploy dev token was available"
            fi
            if [ -n "${{ vars.AZURE_REQUIRED_WORKFLOW_IMAGES }}" ]; then
              echo "- Required workflow image checks: passed"
            else
              echo "- Required workflow image checks: skipped because AZURE_REQUIRED_WORKFLOW_IMAGES is unset"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
